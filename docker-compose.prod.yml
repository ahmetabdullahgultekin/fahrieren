# fahrieren.com — static (Vite) site on the Hetzner box behind Traefik.
# Replaces Hostinger hosting (plan cancelled 2026-06). DNS apex/www point to
# 116.203.222.213; Traefik issues the Let's Encrypt cert automatically.
services:
  fahrieren-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: fahrieren-website
    container_name: fahrieren-web
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fahrieren-web.rule=Host(`fahrieren.com`) || Host(`www.fahrieren.com`)"
      - "traefik.http.routers.fahrieren-web.entrypoints=websecure"
      - "traefik.http.routers.fahrieren-web.tls.certresolver=letsencrypt"
      - "traefik.http.routers.fahrieren-web.middlewares=secure-headers@file,rate-limit@file"
      - "traefik.http.services.fahrieren-web.loadbalancer.server.port=80"
    deploy:
      resources:
        limits:
          memory: 64M
          pids: 128

networks:
  proxy:
    name: proxy
    external: true
