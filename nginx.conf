server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml text/xml application/manifest+json;

    # Hashed Vite assets are immutable; cache hard.
    location /assets/ { expires 1y; add_header Cache-Control "public, immutable"; }
    location ~* \.(css|js|woff2|svg|png|jpe?g|gif|ico|webp)$ { expires 30d; add_header Cache-Control "public"; }

    # SPA fallback (Vite single-page app / PWA).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
